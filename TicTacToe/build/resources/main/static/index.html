<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики · Древняя Игра</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1> Крестики-Нолики </h1>
        <div class="user-info">
            <span id="username-display"></span>
            <button id="logout-btn" class="btn-small">Выйти из Чертогов</button>
        </div>
    </header>

    <main>
        <div class="game-controls">
            <!-- Выбор режима игры в древнерусском стиле -->
            <div class="mode-selector">
                <label>
                    <input type="radio" name="game-mode" value="PVE" checked>
                    <img src="/image/crown.png" alt="👑" style="width: 48px; height: 48px; vertical-align: middle;"> Биться с Духом Компьютерным
                </label>
                <label>
                    <input type="radio" name="game-mode" value="PVP">
                    <img src="/image/finger.png" alt="🖕" style="width: 48px; height: 48px; vertical-align: middle;">  Сразиться с Бродником
                </label>
            </div>

            <div class="buttons-container">
                <button id="start-btn" class="primary-btn">Начать Новую Битву</button>
                <button id="join-game-btn" class="primary-btn" style="display: none;">Присоединиться к Битве</button>
            </div>
        </div>

        <!-- Список доступных игр -->
        <div id="available-games-section" style="display: none;">
            <h3>
                <img src="/image/axe.png" alt="🪓" style="width: 48px; height: 48px; vertical-align: middle;">
                Доступные Битвы
                <img src="/image/axe1.png" alt="🪓" style="width: 48px; height: 48px; vertical-align: middle;">
                ️</h3>
            <div id="available-games-list"></div>
        </div>

        <div id="game-info">
            <div id="status">Выбери путь свой и начни битву</div>
            <div id="game-id-display" style="display: none;">
                <span>
                    <img src="/image/UUID.png" alt="📕" style="width: 48px; height: 48px; vertical-align: middle;">
                     Метка Битвы:</span>
                <span id="game-id"></span>
                <button id="copy-game-id" class="btn-small">
                    <img src="/image/xe.png" alt="💀" style="width: 48px; height: 48px; vertical-align: middle;">
                     Скопировать Метку</button>
            </div>
        </div>

        <div class="board" id="game-board" style="display: none;">
            <!-- Доска будет отрисовываться динамически -->
        </div>

        <div class="buttons-container">
            <button id="restart-btn" class="primary-btn" style="display: none;">Начать Заново</button>
        </div>
    </main>
</div>

<script src="/script.js"></script>
</body>
</html>
