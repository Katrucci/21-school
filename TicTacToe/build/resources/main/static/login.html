<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Tic-Tac-Toe</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="login-container">
    <h1>Вход в игру</h1>

    <form id="login-form">
        <div class="form-group">
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="Как звать тебя?"
                   required
                   autocomplete="username"
                   pattern="[a-zA-Zа-яА-Я0-9]{3,10}"
                   title="Только буквы от 3 до 10"
                   autofocus>
        </div>

        <div class="form-group password-field">
            <!-- Скрытое реальное поле пароля -->
            <input type="password"
                   id="password-real"
                   name="password"
                   required
                   autocomplete="current-password"
                   minlength="5"
                   style="position: absolute; opacity: 0; height: 0; width: 0;"
                   tabindex="-1">

            <!-- Видимое поле для отображения маски -->
            <input type="text"
                   id="password-display"
                   placeholder="Тайное слово"
                   autocomplete="off"
                   required
                   minlength="5"
                   title="Минимум 5 символов">

            <!-- Кастомная подсказка -->
            <span class="custom-tooltip"> От пяти символов</span>
        </div>

        <button type="submit" class="primary-btn">
            Теперь ты готов к игре!
        </button>
    </form>

    <div class="register-link">
        Бродил раньше? <a href="#" id="login-link">Заходи!</a>
    </div>

    <div id="message-box" style="display: none;"></div>
</div>

<script>
    // Символ, который будет отображаться вместо пароля
    const MASK_CHAR = '✦';

    const passwordReal = document.getElementById('password-real');
    const passwordDisplay = document.getElementById('password-display');

    // Синхронизация видимого поля со скрытым
    passwordDisplay.addEventListener('input', (e) => {
        const realValue = passwordReal.value;
        const displayValue = e.target.value;

        if (e.inputType === 'deleteContentBackward') {
            // Удаляем последний символ из реального пароля
            passwordReal.value = realValue.slice(0, -1);
        } else if (displayValue.length > realValue.length) {
            // Добавляем новый символ в реальный пароль
            const newChar = displayValue.slice(-1);
            if (newChar !== MASK_CHAR) {
                passwordReal.value = realValue + newChar;
            }
        }

        // Обновляем отображение маской
        const maskedValue = MASK_CHAR.repeat(passwordReal.value.length);
        const cursorPos = e.target.selectionStart;
        e.target.value = maskedValue;
        e.target.setSelectionRange(cursorPos, cursorPos);
    });

    // Обработка Backspace
    passwordDisplay.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
            e.preventDefault();
            passwordReal.value = passwordReal.value.slice(0, -1);
            passwordDisplay.value = MASK_CHAR.repeat(passwordReal.value.length);
        }
    });

    // Проверка наличия авторизации
    if (localStorage.getItem('userId')) {
        window.location.href = '/index.html';
    }

    function getAuthHeader(username, password) {
        const encoded = unescape(encodeURIComponent(username + ':' + password));
        return 'Basic ' + btoa(encoded);
    }

    // Логика кнопки "Теперь ты готов к игре!" (Регистрация)
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = passwordReal.value; // Берём из скрытого поля!
        const msgBox = document.getElementById('message-box');
        msgBox.style.display = 'none';

        // Проверка длины пароля
        if (password.length < 5) {
            msgBox.style.display = 'block';
            msgBox.className = 'error-message';
            msgBox.textContent = 'Тайное слово от пяти символов и больше';
            return;
        }

        const authHeader = getAuthHeader(username, password);

        try {
            // 1. Пытаемся зарегистрировать
            const registerResponse = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: username, password: password })
            });

            if (registerResponse.ok) {
                // 2. Если ок — сразу авторизуемся
                const loginResponse = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Authorization': authHeader }
                });

                if (loginResponse.ok) {
                    const data = await loginResponse.json();
                    localStorage.setItem('authHeader', authHeader);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userLogin', username);
                    window.location.href = '/index.html';
                } else {
                    msgBox.style.display = 'block';
                    msgBox.className = 'error-message';
                    msgBox.textContent = 'Ошибка входа после регистрации';
                }
            } else {
                const errorData = await registerResponse.json();
                msgBox.style.display = 'block';
                msgBox.className = 'error-message';

                // Показываем ПРАВИЛЬНУЮ ошибку
                if (registerResponse.status === 400) {
                    msgBox.textContent = errorData.error || 'Пароль должен содержать минимум 5 символов';
                } else if (registerResponse.status === 409) {
                    msgBox.textContent = 'Это имя уже занято. Нажмите "Заходи!"';
                } else {
                    msgBox.textContent = errorData.error || 'Ошибка регистрации';
                }
            }
        } catch (err) {
            msgBox.style.display = 'block';
            msgBox.className = 'error-message';
            msgBox.textContent = 'Ошибка соединения';
        }
    });

    // Логика ссылки "Заходи!" (Вход)
    document.getElementById('login-link').addEventListener('click', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = passwordReal.value; // Берём из скрытого поля!
        const msgBox = document.getElementById('message-box');
        msgBox.style.display = 'none';

        if (!username || !password) {
            msgBox.style.display = 'block';
            msgBox.className = 'error-message';
            msgBox.textContent = 'Введите имя и пароль';
            return;
        }

        const authHeader = getAuthHeader(username, password);

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Authorization': authHeader }
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('authHeader', authHeader);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('userLogin', username);
                window.location.href = '/index.html';
            } else {
                msgBox.style.display = 'block';
                msgBox.className = 'error-message';
                msgBox.textContent = 'Неверное имя или пароль';
            }
        } catch (err) {
            msgBox.style.display = 'block';
            msgBox.className = 'error-message';
            msgBox.textContent = 'Ошибка соединения';
        }
    });
</script>
</body>
</html>
