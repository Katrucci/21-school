<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главный пульт управления</title>
    <link rel="stylesheet" href="https://fontsource.org/raleway/400.css">
    <link rel="stylesheet" href="https://fontsource.org/raleway/700.css">
    <link rel="stylesheet" href="/style.css">

</head>

<body>
    <div class="control-panel-wrapper">

        <div class="control-panel">
            <div class="rust rust-1"></div>
            <div class="rust rust-2"></div>
            <div class="rust rust-3"></div>
            <div class="rust rust-4"></div>
            <div class="rust rust-5"></div>
            <div class="rust rust-6"></div>

            <div class="panel-screw screw-tl"></div>
            <div class="panel-screw screw-tr"></div>
            <div class="panel-screw screw-bl"></div>
            <div class="panel-screw screw-br"></div>

            <div class="panel-title">
                <div class="panel-title-plate">
                    <div class="panel-screws-title tl"></div>
                    <div class="panel-screws-title tr"></div>
                    <div class="panel-screws-title bl"></div>
                    <div class="panel-screws-title br"></div>
                    <h1>Главный пульт управления</h1>
                </div>
            </div>

            <div class="panel-top-section">
                <div class="left-buttons">
                    <div class="btn-container">
                        <button class="btn-engine" id="engineBtn">
                            <span>Запуск двигателя</span>
                        </button>
                    </div>
                    <div class="btn-container">
                        <button class="btn-airlock" id="airlockBtn">
                            <span>Открыть шлюз</span>
                        </button>
                    </div>
                </div>

                <div class="center-indicators">
                    <div class="indicator">
                        <span class="indicator-label">Норма</span>
                        <div class="indicator-light green" id="statusLight"></div>
                    </div>
                    <!--<div class="indicator-light orange" id="warningLight"></div>-->
                    <div class="temperature-display">
                        <span class="temp-label">Температура<br>корпуса:</span>
                        <span class="temp-value" id="tempValue">+22°C</span>
                    </div>
                </div>

                <div class="photo-tape">
                    <img src="image/2.png" alt="Family photo">
                </div>
            </div>

            <div class="panel-middle-section">
                <div class="slider-group">
                    <div class="slider-row">
                        <span class="slider-label">Мощность двигателей:</span>
                        <div class="slider-container">
                            <div class="slider-track">
                                <div class="slider-fill engine-power" id="engineFill" style="width: 75%"></div>
                            </div>
                            <input type="range" min="0" max="100" id="powerRange" value="75">
                        </div>
                        <div class="digital-display">
                            <span class="digital-value" id="engineValue">75</span>
                        </div>
                    </div>
                    <div class="slider-row">
                        <span class="slider-label">Яркость панели:</span>
                        <div class="slider-container">
                            <div class="slider-track">
                                <div class="slider-fill brightness" id="brightnessFill" style="width: 60%"></div>
                            </div>
                            <input type="range" id="brightnessRange" min="0" max="100" value="60">
                        </div>

                        <div class="digital-display">
                            <span class="digital-value orange" id="brightnessValue">60</span>
                        </div>
                    </div>
                </div>
            </div>


            <div class="panel-bottom-section">
                <div class="toggle-section">
                    <div class="warning-indicator">
                        <div class="warning-light" id="lowBatteryLight"></div>
                        <span class="warning-text">Внимание:<br>низкий заряд</span>
                    </div>
                    <div class="toggle-container">
                        <div class="toggle-container">
                            <span class="toggle-label-left">РУЧНОЕ<br>УПРАВЛЕНИЕ</span>
                            <label class="toggle-switch-modern">
                                <input type="checkbox" id="autoPilotToggle">
                                <div class="toggle-track">
                                    <div class="toggle-thumb"></div>
                                </div>
                            </label>
                            <span class="toggle-label-right">АВТОПИЛОТ</span>
                        </div>
                    </div>


                    <div class="emergency-section">
                        <div class="emergency-cover" id="emergencyCover">
                            <div class="cover-stripes-top"></div>
                            <div class="cover-stripes-left"></div>
                            <div class="cover-stripes-right"></div>
                            <div class="cover-top" id="coverTop"></div>
                            <div class="cover-hinge"></div>
                            <button class="btn-emergency" id="emergencyBtn">
                                <span>Аварийный<br>стоп</span>
                            </button>
                            <div class="cover-stripes"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-message" id="statusMessage"></div>
        <script src="1.js"></script>
        <script src="sound.js"></script>
</body>

</html>
